name: release

on:
  push:
    branches: [main]

# Allow only one concurrent release run; queue the rest.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # create release commit / tags
  pull-requests: write  # open the "Version Packages" PR
  id-token: write       # required for npm provenance

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Changesets needs the full history to compute changelog diffs.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Run tests
        run: pnpm -r test --if-present

      # The action will:
      #   - if .changeset/*.md exist → open / update a "Version Packages" PR
      #   - if there are no pending changesets but versions are bumped → publish
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Enables `npm publish --provenance` automatically when supported.
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Summary
        if: always()
        run: |
          echo "published=${{ steps.changesets.outputs.published }}"
          echo "publishedPackages=${{ steps.changesets.outputs.publishedPackages }}"
